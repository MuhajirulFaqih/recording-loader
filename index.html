<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio Reactive Record SVG</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --panel: rgba(255, 255, 255, 0.07);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.58);
      --cyan: #24D5E8;
      --purple: #5227FF;
      --magenta: #9123E8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 28%, rgba(36, 213, 232, 0.12), transparent 34%),
        radial-gradient(circle at 35% 75%, rgba(82, 39, 255, 0.16), transparent 28%),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .page {
      width: min(920px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(260px, 1fr);
      gap: 28px;
      align-items: center;
    }

    .visual-card {
      display: grid;
      place-items: center;
      min-height: 520px;
      overflow: hidden;
      position: relative;
    }

    #recordSvg {
      width: min(390px, 76vw);
      height: auto;
      display: block;
    }

    /* When JS is active, it controls transform and opacity directly. */
    #recordSvg.audio-reactive .record-light,
    #recordSvg.audio-reactive .record-center {
      animation: none !important;
    }

    #recordSvg.audio-reactive .record-light {
      transform-box: view-box;
      transform-origin: 195px 195px;
      transition: opacity 90ms linear;
    }

    #recordSvg.audio-reactive .record-center {
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 90ms linear;
    }

    .controls {
      padding: 30px;
      border: 1px solid var(--panel-border);
      border-radius: 30px;
      background: var(--panel);
      backdrop-filter: blur(20px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    .desc {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      min-height: 42px;
      padding: 0 16px;
      font-weight: 650;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      box-shadow: 0 12px 30px rgba(36, 213, 232, 0.16);
    }

    .status {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      line-height: 1.5;
    }

    .meter-stack {
      display: grid;
      gap: 13px;
    }

    .meter {
      display: grid;
      gap: 7px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
    }

    .meter-track {
      position: relative;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .meter-track::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--value, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--magenta));
      transition: width 80ms linear;
    }

    .note {
      margin: 22px 0 0;
      color: rgba(255, 255, 255, 0.48);
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 760px) {
      .page {
        grid-template-columns: 1fr;
      }

      .visual-card {
        min-height: 430px;
        padding: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="visual-card" aria-label="Audio reactive record visual">
      <img src="mic-icon.png" alt="" class="record-center"/>
      <svg id="recordSvg" class="record-visual" style="width: 100%;" viewBox="0 0 390 390" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

<style>

  svg {
    overflow: hidden;
    background: #000;
  }

  .record-light {
    transform-box: view-box;
    transform-origin: 195px 195px;
    will-change: transform, opacity, filter;
  }

  .light-orbit-1 {
    animation: lightOrbitOne 8.8s ease-in-out infinite alternate;
  }

  .light-orbit-2 {
    animation: lightOrbitTwo cubic-bezier(0.6, 0.04, 0.98, 0.335) ease-in-out infinite alternate-reverse;
  }

  .light-orbit-3 {
    animation: lightOrbitThree 8.4s ease-in-out infinite alternate;
  }

  .light-orbit-4 {
    animation: lightOrbitFour 8.1s ease-in-out infinite alternate-reverse;
  }

  .record-center {
    transform-box: fill-box;
    transform-origin: center;
    will-change: transform, opacity;
    animation: recordingPulse 2s linear infinite;
    position: absolute;
    width: 100%;
  }

  @keyframes recordingPulse {
    0% {
      transform: scale(1);
      opacity: 1;
    }
    50% {
      transform: scale(1.1);
      opacity: 0.96;
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes lightOrbitOne {
    0%   { transform: rotate(0deg) translate(0px, 0px) scale(1); opacity: .75; }
    22%  { transform: rotate(48deg) translate(9px, -13px) scale(1.08); opacity: .96; }
    43%  { transform: rotate(111deg) translate(-15px, 6px) scale(.96); opacity: .72; }
    67%  { transform: rotate(193deg) translate(0px, 12px) scale(1); opacity: .98; }
    100% { transform: rotate(277deg) translate(-7px, -10px) scale(1.02); opacity: .82; }
  }

  @keyframes lightOrbitTwo {
    0%   { transform: rotate(12deg) translate(0px, 0px) scale(1.03); opacity: .62; }
    26%  { transform: rotate(-51deg) translate(-12px, 10px) scale(.94); opacity: .9; }
    49%  { transform: rotate(-136deg) translate(11px, -9px) scale(.80); opacity: .68; }
    74%  { transform: rotate(-211deg) translate(0px, 7px) scale(.98); opacity: .95; }
    100% { transform: rotate(-318deg) translate(-6px, 13px) scale(1.05); opacity: .72; }
  }

  @keyframes lightOrbitThree {
    0%   { transform: rotate(0deg) translate(0px, 0px) scale(.98); opacity: .72; }
    20%  { transform: rotate(63deg) translate(-14px, -6px) scale(1.06); opacity: .94; }
    46%  { transform: rotate(142deg) translate(10px, 16px) scale(.92); opacity: .66; }
    71%  { transform: rotate(226deg) translate(-18px, 8px) scale(.72); opacity: .98; }
    100% { transform: rotate(352deg) translate(8px, -15px) scale(1); opacity: .76; }
  }

  @keyframes lightOrbitFour {
    0%   { transform: rotate(-8deg) translate(0px, 0px) scale(1); opacity: .55; }
    24%  { transform: rotate(58deg) translate(15px, -12px) scale(.85); opacity: .92; }
    52%  { transform: rotate(169deg) translate(-11px, 15px) scale(.95); opacity: .7; }
    79%  { transform: rotate(241deg) translate(7px, 5px) scale(1.06); opacity: .88; }
    100% { transform: rotate(323deg) translate(-9px, -14px) scale(.99); opacity: .62; }
  }

  @media (prefers-reduced-motion: reduce) {
    .record-light,
    .record-center {
      animation: none;
    }
  }
  
</style>

<rect width="390" height="390" fill="black"/>

    </section>

    <section class="controls">
      <h1>Voice Reactive Record</h1>

      <div class="button-row">
        <button class="primary" type="button" data-action="start">Use Microphone</button>
        <button type="button" data-action="stop" disabled>Stop</button>
      </div>

      <p class="status" data-status>Idle animation. Click microphone to connect real voice frequency.</p>

      <div class="meter-stack" aria-label="Frequency meters">
        <div class="meter">
          <div class="meter-label"><span>Energy</span><span>overall voice level</span></div>
          <div class="meter-track" data-meter="energy"></div>
        </div>
        <div class="meter">
          <div class="meter-label"><span>Low</span><span>70–250 Hz</span></div>
          <div class="meter-track" data-meter="low"></div>
        </div>
        <div class="meter">
          <div class="meter-label"><span>Mid</span><span>250–1600 Hz</span></div>
          <div class="meter-track" data-meter="mid"></div>
        </div>
        <div class="meter">
          <div class="meter-label"><span>High</span><span>1600–5200 Hz</span></div>
          <div class="meter-track" data-meter="high"></div>
        </div>
      </div>
    </section>
  </main>

  <script>

(() => {
  const svg = document.querySelector("#recordSvg");
  const center = svg?.querySelector(".record-center");
  const lights = svg ? [...svg.querySelectorAll(".record-light")] : [];
  const blurNodes = svg ? [...svg.querySelectorAll("filter feGaussianBlur")] : [];

  const startBtn = document.querySelector("[data-action='start']");
  const stopBtn = document.querySelector("[data-action='stop']");
  const demoBtn = document.querySelector("[data-action='demo']");
  const statusEl = document.querySelector("[data-status]");
  const energyBar = document.querySelector("[data-meter='energy']");
  const lowBar = document.querySelector("[data-meter='low']");
  const midBar = document.querySelector("[data-meter='mid']");
  const highBar = document.querySelector("[data-meter='high']");

  if (!svg || !center || lights.length === 0) {
    console.warn("SVG record elements were not found.");
    return;
  }

  const baseBlur = blurNodes.map((node) => Number(node.getAttribute("stdDeviation")) || 14);

  let audioContext = null;
  let analyser = null;
  let sourceNode = null;
  let micStream = null;
  let frequencyData = null;
  let rafId = null;
  let mode = "idle";

  const state = {
    energy: 0,
    low: 0,
    mid: 0,
    high: 0,
    angle: 0
  };

  const clamp = (value, min = 0, max = 1) => Math.min(max, Math.max(min, value));
  const lerp = (from, to, amount) => from + (to - from) * amount;

  function setStatus(text) {
    if (statusEl) statusEl.textContent = text;
  }

  function setMeters({ energy, low, mid, high }) {
    if (energyBar) energyBar.style.setProperty("--value", `${Math.round(energy * 100)}%`);
    if (lowBar) lowBar.style.setProperty("--value", `${Math.round(low * 100)}%`);
    if (midBar) midBar.style.setProperty("--value", `${Math.round(mid * 100)}%`);
    if (highBar) highBar.style.setProperty("--value", `${Math.round(high * 100)}%`);
  }

  function setButtons(running) {
    if (startBtn) startBtn.disabled = running;
    if (demoBtn) demoBtn.disabled = running && mode === "mic";
    if (stopBtn) stopBtn.disabled = !running;
  }

  function averageFrequencyRange(fromHz, toHz) {
    if (!audioContext || !analyser || !frequencyData) return 0;

    const nyquist = audioContext.sampleRate / 2;
    const startIndex = Math.max(0, Math.floor((fromHz / nyquist) * frequencyData.length));
    const endIndex = Math.min(frequencyData.length - 1, Math.ceil((toHz / nyquist) * frequencyData.length));

    let sum = 0;
    let count = 0;

    for (let i = startIndex; i <= endIndex; i++) {
      sum += frequencyData[i];
      count += 1;
    }

    return count ? sum / count / 255 : 0;
  }

  function updateVisual(input, now) {
    const target = {
      energy: clamp(Math.pow(input.energy, 0.82)),
      low: clamp(input.low),
      mid: clamp(input.mid),
      high: clamp(input.high)
    };

    // Smoothing keeps the motion premium and prevents jitter.
    state.energy = lerp(state.energy, target.energy, 0.18);
    state.low = lerp(state.low, target.low, 0.16);
    state.mid = lerp(state.mid, target.mid, 0.20);
    state.high = lerp(state.high, target.high, 0.14);

    const t = now * 0.001;
    const pulseNoise = Math.sin(t * 9.5) * 0.006 * state.energy;

    // Main image: mostly responds to voice presence + mid frequencies.
    const centerScale = 1 + state.energy * 0.075 + state.mid * 0.05 + pulseNoise;
    center.style.transform = `scale(${centerScale.toFixed(4)})`;
    center.style.opacity = (0.94 + state.energy * 0.06).toFixed(3);

    // Blur lights: low = bloom radius, mid = movement, high = flicker/brightness.
    lights.forEach((light, index) => {
      const direction = index % 2 === 0 ? 1 : -1;
      const phase = t * (0.58 + index * 0.11 + state.energy * 0.72) + index * 1.87;
      const radius = 7 + state.low * 24 + state.energy * 12 + index * 1.5;

      const x = Math.cos(phase * 1.23 + index) * radius;
      const y = Math.sin(phase * 1.08 + index * 0.6) * radius;
      const rotation = direction * (phase * 72 + state.high * 55 + index * 18);
      const lightScale = 0.92 + state.energy * 0.28 + state.low * 0.08 + index * 0.015;
      const lightOpacity = clamp(0.42 + state.energy * 0.44 + state.high * 0.18 - index * 0.025, 0.28, 1);

      light.style.transform = `rotate(${rotation.toFixed(2)}deg) translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) scale(${lightScale.toFixed(4)})`;
      light.style.opacity = lightOpacity.toFixed(3);
    });

    blurNodes.forEach((node, index) => {
      const blur = baseBlur[index] + state.energy * 5.5 + state.high * 3.5 + state.low * 1.5;
      node.setAttribute("stdDeviation", blur.toFixed(2));
    });

    setMeters(state);
  }

  function renderMic(now) {
    analyser.getByteFrequencyData(frequencyData);

    // Frequency bands tuned for voice:
    // low  = fundamental warmth / boom
    // mid  = strongest speech presence
    // high = breath / consonant detail
    const low = averageFrequencyRange(70, 250);
    const mid = averageFrequencyRange(250, 1600);
    const high = averageFrequencyRange(1600, 5200);

    // Weighted total energy. Mid gets more weight because speech mostly lives there.
    const energy = clamp(low * 0.28 + mid * 0.52 + high * 0.20);

    updateVisual({ energy, low, mid, high }, now);
    rafId = requestAnimationFrame(renderMic);
  }

  function renderDemo(now) {
    const t = now * 0.001;

    // Fake speech-like movement so you can preview without microphone access.
    const low = clamp(0.2 + Math.sin(t * 2.0) * 0.18 + Math.sin(t * 5.3) * 0.08);
    const mid = clamp(0.34 + Math.sin(t * 3.1) * 0.24 + Math.sin(t * 9.4) * 0.07);
    const high = clamp(0.16 + Math.sin(t * 7.8) * 0.16 + Math.sin(t * 13.2) * 0.06);
    const energy = clamp(low * 0.26 + mid * 0.56 + high * 0.18);

    updateVisual({ energy, low, mid, high }, now);
    rafId = requestAnimationFrame(renderDemo);
  }

  async function startMic() {
    try {
      stopAll(false);

      mode = "mic";
      svg.classList.add("audio-reactive");
      setStatus("Requesting microphone permission...");
      setButtons(true);

      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: false
        }
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.78;

      frequencyData = new Uint8Array(analyser.frequencyBinCount);
      sourceNode = audioContext.createMediaStreamSource(micStream);
      sourceNode.connect(analyser);

      setStatus("Listening — speak near the microphone.");
      rafId = requestAnimationFrame(renderMic);
    } catch (error) {
      console.error(error);
      setStatus("Microphone blocked/unavailable. Try Demo Mode or run from HTTPS/localhost.");
      stopAll();
    }
  }

  function startDemo() {
    stopAll(false);

    mode = "demo";
    svg.classList.add("audio-reactive");
    setStatus("Demo mode — simulated voice frequency.");
    setButtons(true);

    rafId = requestAnimationFrame(renderDemo);
  }

  function resetVisual() {
    svg.classList.remove("audio-reactive");

    center.style.transform = "";
    center.style.opacity = "";

    lights.forEach((light) => {
      light.style.transform = "";
      light.style.opacity = "";
    });

    blurNodes.forEach((node, index) => {
      node.setAttribute("stdDeviation", baseBlur[index]);
    });

    state.energy = 0;
    state.low = 0;
    state.mid = 0;
    state.high = 0;

    setMeters(state);
  }

  function stopAll(reset = true) {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;

    if (sourceNode) sourceNode.disconnect();
    sourceNode = null;

    if (micStream) {
      micStream.getTracks().forEach((track) => track.stop());
    }
    micStream = null;

    if (audioContext && audioContext.state !== "closed") {
      audioContext.close();
    }
    audioContext = null;
    analyser = null;
    frequencyData = null;

    mode = "idle";
    setButtons(false);
    setStatus("Idle animation. Click microphone to connect real voice frequency.");

    if (reset) resetVisual();
  }

  startBtn?.addEventListener("click", startMic);
  demoBtn?.addEventListener("click", startDemo);
  stopBtn?.addEventListener("click", () => stopAll(true));

  window.addEventListener("beforeunload", () => stopAll(false));
  setButtons(false);
  setMeters(state);
})();

  </script>
</body>
</html>
